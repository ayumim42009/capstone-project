<!DOCTYPE html>
<html lang="en">
<head>

  <title>Home — resipi</title>
  
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* page-specific styles */

    /* main page with a sidebar */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 260px; 
      min-height: calc(100vh - 61px);
    }

    /* main page - left side */
    .recipe-content {
      padding: 2rem 4rem;
    }

    .section-title {
      font-family: 'Roboto', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #3D1500;
      margin-bottom: 2rem;
    }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 per row */
      gap: 2rem;
    }

    .recipe-card {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .recipe-img-square {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 0.8rem;
    }

    .placeholder-img {
      background-color: #D6CEC8;
    }

    .recipe-card-title {
      font-size: 1rem;
      font-weight: 400;
      color: #2C1A0E;
      margin-bottom: 0.4rem;
    }

    .stars {
      color: #992900;
      font-size: 1.2rem;
      letter-spacing: 2px;
    }

    /* sidebar */
    .sidebar {
      background-color: #EBE3DF; 
      padding: 2rem;
      border-left: 1px solid #D6CEC8;
    }

    .sidebar-title {
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #2C1A0E;
      margin-bottom: 1.5rem;
    }

    .filter-group-title {
      font-family: 'Roboto', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #2C1A0E;
      margin-bottom: 0.8rem;
      margin-top: 1.5rem;
    }

    .filter-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Roboto', sans-serif;
      font-size: 0.9rem;
      color: #2C1A0E;
      margin-bottom: 0.6rem;
      cursor: pointer;
    }

    .filter-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #992900; /* tints when clicked */
    }
  </style>
</head>
