<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Form — resipi</title>
  
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* page specific styles*/
    
    .page-content {
      padding: 2rem 3rem;
      max-width: 800px;
    }

    form input[type="text"] {
      float: none;
      margin: 5px 0 15px 0;
      display: block; 
      width: 250px; 
    }

    
    input[type="submit"] {
      background-color: #992900;
      color: #F9EFEC;
      font-family: 'Roboto', sans-serif;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
    }

    input[type="submit"]:hover {
      background-color: #8e2600;
    }

    h1 {
      font-family: 'Labrada', serif;
      color: #3D1500;
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    h2 {
      font-family: 'Roboto', sans-serif;
      color: #2C1A0E;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    label {
      font-family: 'Roboto', sans-serif;
      color: #3D1500;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">resipi</div>
    <div class="nav">
      <a href="index.html">home</a> 
      <a href="addRecipe.html">add recipe</a> 
      <a href="tempConversion.html">conversion</a> 
      <div class="nav-right"> 
        <input type="text" placeholder="Search for recipe"> 
        <button class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button> 
        <button class="icon">&#9776;</button> 
      </div> 
    </div>
  </div>

  <div class="page-content">
    <h1>Enter the recipe you wish to add to your collection</h1>
    <h2>Ingredients</h2>  
<form>
    <label for="ingredient1">Ingredient 1:</label><br>
    <input type="text" id="ingredient1" name="ingredient1"><br>
    <label for="ingredient2">Ingredient 2:</label><br>
    <input type="text" id="ingredient2" name="ingredient2"><br>
    <label for="ingredient3">Ingredient 3:</label><br>
    <input type="text" id="ingredient3" name="ingredient3"><br><br>
    <input type="submit" value="Submit">
</form>
</body>
</html>
