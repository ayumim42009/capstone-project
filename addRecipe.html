<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> adding page — resipi</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* page-specific styles */

    /* center the content vertically */
    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 61px);
      gap: 1.25rem;
    }

    /* overwrite heading font*/
    .page-heading {
      font-family: 'Roboto', sans-serif;
      font-style: normal;
    }

    /* recipe link input */
    .recipe-input {
      width: 100%;
      max-width: 420px;
      padding: 0.65rem 1rem;
      border: 1px solid #D4B89A;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: 'Roboto', sans-serif;
      background: #fff;
      margin: 0;
    }

    .recipe-input:focus {
      outline: none;
      border-color: #992900;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">resipi</div>
    <div class="nav">
      <a href="index.html">home</a>
      <a href="addRecipe.html">add recipe</a>
      <a href="tempConversion.html">conversion</a>
      <div class="nav-right">
        <input type="text" placeholder="Search for recipe">
        <button class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="icon">&#9776;</button>
      </div>
    </div>
  </div>

  <div class="page-content">
    <h1 class="page-heading">Paste Your Recipe</h1>
    <input class="recipe-input" type="text" placeholder="Paste your link here...">
    <button class="action-btn" onclick="window.location.href='downloadRecipe.html', execPythonScript()">
      Download
    </button>
  </div>

</body>
</html>
